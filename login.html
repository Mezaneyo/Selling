<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Msika Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 24px;
    }
    
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      border-color: #4361ee;
    }
    
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: #4361ee;
      color: white;
    }
    
    .btn-google {
      background: white;
      color: #4285F4;
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    
    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #e0e0e0;
    }
    
    .divider::before {
      left: 0;
    }
    
    .divider::after {
      right: 0;
    }
    
    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    
    .signup-link a {
      color: #4361ee;
      text-decoration: none;
    }
    
    .error-message {
      color: #dc2626;
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }
    
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .forgot-password {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 20px;
    }
    
    .forgot-password a {
      color: #6c757d;
      font-size: 13px;
      text-decoration: none;
    }
    
    .forgot-password a:hover {
      text-decoration: underline;
      color: #4361ee;
    }
    
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      width: 90%;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .modal-content h3 {
      margin-bottom: 15px;
      color: #333;
      font-size: 22px;
    }
    
    .modal-content p {
      margin-bottom: 20px;
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .modal-content input {
      margin-bottom: 15px;
    }
    
    .modal-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
    }
    
    .modal-btn-primary {
      background: #4361ee;
      color: white;
    }
    
    .modal-btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .reset-message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
    
    .reset-success {
      color: #4bb543;
    }
    
    .reset-error {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🛒</div>
    <h1>Welcome Back</h1>
    
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required>
      <div class="error-message" id="email-error">Please enter a valid email</div>
      
      <input type="password" id="password" placeholder="Password" required>
      <div class="error-message" id="password-error">Invalid email or password</div>
      
      <div class="forgot-password">
        <a href="#" id="forgot-password-link">Forgot password?</a>
      </div>
      
      <button type="submit" class="btn-primary" id="login-btn">
        <span id="btn-text">Sign In</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
    
    <div class="divider">or</div>
    
    <button class="btn-google" id="google-login">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Create Account</a>
    </div>
  </div>
  
  <!-- Forgot Password Modal -->
  <div class="modal" id="reset-modal">
    <div class="modal-content">
      <h3>Reset Password</h3>
      <p>Enter your email address and we'll send you a link to reset your password.</p>
      <input type="email" id="reset-email" placeholder="Enter your email">
      <button class="modal-btn modal-btn-primary" id="send-reset-btn">Send Reset Link</button>
      <button class="modal-btn modal-btn-secondary" id="close-modal-btn">Cancel</button>
      <div class="reset-message" id="reset-message"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAadEukg8HmIUwJ6BC2oYYwbz0qb19iR2I",
      authDomain: "msika-2.firebaseapp.com",
      projectId: "msika-2",
      storageBucket: "msika-2.firebasestorage.app",
      messagingSenderId: "826396419263",
      appId: "1:826396419263:web:1fb8752bafd530ba81520a"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    
    // DOM Elements
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');
    const googleBtn = document.getElementById('google-login');
    
    // Modal Elements
    const resetModal = document.getElementById('reset-modal');
    const forgotPasswordLink = document.getElementById('forgot-password-link');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const sendResetBtn = document.getElementById('send-reset-btn');
    const resetEmail = document.getElementById('reset-email');
    const resetMessage = document.getElementById('reset-message');
    
    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
    
    function showError(elementId) {
      document.getElementById(elementId).style.display = 'block';
    }
    
    function hideErrors() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
      });
    }
    
    function setLoading(isLoading) {
      if (isLoading) {
        loginBtn.disabled = true;
        btnText.style.display = 'none';
        spinner.style.display = 'block';
      } else {
        loginBtn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    }
    
    // FORGOT PASSWORD FUNCTIONALITY
    if (forgotPasswordLink) {
      forgotPasswordLink.addEventListener('click', (e) => {
        e.preventDefault();
        resetModal.style.display = 'flex';
        resetEmail.value = '';
        resetMessage.innerHTML = '';
      });
    }
    
    if (closeModalBtn) {
      closeModalBtn.addEventListener('click', () => {
        resetModal.style.display = 'none';
      });
    }
    
    if (sendResetBtn) {
      sendResetBtn.addEventListener('click', async () => {
        const email = resetEmail.value.trim();
        
        if (!email) {
          resetMessage.innerHTML = '<span class="reset-error">❌ Please enter your email address</span>';
          return;
        }
        
        if (!validateEmail(email)) {
          resetMessage.innerHTML = '<span class="reset-error">❌ Please enter a valid email address</span>';
          return;
        }
        
        sendResetBtn.disabled = true;
        sendResetBtn.textContent = 'Sending...';
        resetMessage.innerHTML = '<span style="color: #4361ee;">⏳ Sending reset link...</span>';
        
        try {
          // This is the magic line - Firebase sends the email automatically!
          await sendPasswordResetEmail(auth, email);
          
          resetMessage.innerHTML = '<span class="reset-success">✅ Password reset email sent! Check your inbox.</span>';
          resetEmail.value = '';
          
          // Close modal after 3 seconds
          setTimeout(() => {
            resetModal.style.display = 'none';
            resetMessage.innerHTML = '';
          }, 3000);
          
        } catch (error) {
          console.error("Password reset error:", error);
          
          let errorMessage = '❌ Failed to send reset email.';
          if (error.code === 'auth/user-not-found') {
            errorMessage = '❌ No account found with this email address.';
          } else if (error.code === 'auth/invalid-email') {
            errorMessage = '❌ Invalid email address format.';
          } else if (error.code === 'auth/too-many-requests') {
            errorMessage = '❌ Too many requests. Please try again later.';
          }
          
          resetMessage.innerHTML = `<span class="reset-error">${errorMessage}</span>`;
        } finally {
          sendResetBtn.disabled = false;
          sendResetBtn.textContent = 'Send Reset Link';
        }
      });
    }
    
    // Close modal when clicking outside
    window.addEventListener('click', (e) => {
      if (e.target === resetModal) {
        resetModal.style.display = 'none';
      }
    });
    
    // EMAIL LOGIN
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideErrors();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      if (!validateEmail(email)) {
        showError('email-error');
        return;
      }
      
      setLoading(true);
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error("Login error:", error);
        
        let errorMsg = 'Invalid email or password';
        if (error.code === 'auth/user-not-found') {
          errorMsg = 'No account found with this email';
        } else if (error.code === 'auth/wrong-password') {
          errorMsg = 'Incorrect password';
        } else if (error.code === 'auth/too-many-requests') {
          errorMsg = 'Too many attempts. Try again later';
        }
        
        document.getElementById('password-error').textContent = errorMsg;
        showError('password-error');
        setLoading(false);
      }
    });
    
    // GOOGLE LOGIN
    googleBtn.addEventListener('click', async () => {
      googleBtn.disabled = true;
      googleBtn.innerHTML = '<div class="spinner" style="display: block;"></div>';
      
      try {
        await signInWithPopup(auth, googleProvider);
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error("Google login error:", error);
        
        let errorMsg = 'Google login failed';
        if (error.code === 'auth/popup-closed-by-user') {
          errorMsg = 'Login cancelled. Please try again.';
        } else if (error.code === 'auth/unauthorized-domain') {
          errorMsg = 'Domain not authorized. Please contact support.';
        }
        
        alert(errorMsg);
        googleBtn.disabled = false;
        googleBtn.innerHTML = 'Continue with Google';
      }
    });
  </script>
</body>
</html>
