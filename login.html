<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Marketplace</title>
  
  <style>
    :root {
      --primary: #4361ee;
      --primary-hover: #3a56d4;
      --secondary: #3f37c9;
      --error: #f72585;
      --success: #4bb543;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --bg-color: #f5f7fa;
      --text-color: #212529;
      --card-bg: white;
      --border-color: #e2e8f0;
      --shadow: 0 4px 20px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }
    
    [data-theme="dark"] {
      --primary: #5a72f5;
      --primary-hover: #4a5ae9;
      --secondary: #4a5ae9;
      --error: #ff4d8f;
      --light: #2d3748;
      --dark: #f8f9fa;
      --gray: #adb5bd;
      --bg-color: #1a202c;
      --text-color: #f8f9fa;
      --card-bg: #2d3748;
      --border-color: #4a5568;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: grid;
      place-items: center;
      line-height: 1.6;
      transition: var(--transition);
      padding: 1rem;
    }
    
    .login-container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 2.5rem;
      transition: var(--transition);
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .logo svg {
      width: 32px;
      height: 32px;
      fill: var(--primary);
    }
    
    .welcome-title {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-color);
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      transition: var(--transition);
      background-color: var(--card-bg);
      color: var(--text-color);
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
    }
    
    .password-container {
      position: relative;
    }
    
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray);
    }
    
    .error-message {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 0.25rem;
      display: none;
    }
    
    .btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background-color: var(--primary-hover);
    }
    
    .btn-google {
      background-color: white;
      color: #4285F4;
      border: 1px solid #ddd;
    }
    
    .btn-google:hover {
      background-color: #f8f9fa;
    }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: var(--gray);
    }
    
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    
    .divider::before {
      margin-right: 1rem;
    }
    
    .divider::after {
      margin-left: 1rem;
    }
    
    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-color);
      opacity: 0.8;
    }
    
    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    
    .signup-link a:hover {
      text-decoration: underline;
    }
    
    .forgot-password {
      text-align: right;
      margin-top: -1rem;
      margin-bottom: 1.5rem;
    }
    
    .forgot-password a {
      color: var(--gray);
      font-size: 0.85rem;
      text-decoration: none;
    }
    
    .forgot-password a:hover {
      text-decoration: underline;
    }
    
    .settings-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border-color);
      transition: .4s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: var(--primary);
    }
    
    input:checked + .slider:before {
      transform: translateX(30px);
    }
    
    .language-selector {
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      color: var(--text-color);
      cursor: pointer;
    }
    
    .theme-label {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 600px) {
      .login-container {
        padding: 1.5rem;
      }
      
      .settings-bar {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="settings-bar">
      <select class="language-selector" id="language-selector" aria-label="Select language">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="ny">Chichewa</option>
      </select>
      
      <div class="toggle-container">
        <span class="theme-label" id="theme-label">Dark Mode</span>
        <label class="toggle-switch" aria-label="Toggle dark mode">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    
    <div class="logo" data-i18n="app_name">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 7v10l8 5 8-5V7L12 2zm0 2.5L18 9v6l-6 3.5-6-3.5V9l6-3.5z"/>
      </svg>
      Marketplace
    </div>
    
    <h1 class="welcome-title" data-i18n="welcome_back">Welcome Back</h1>
    
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email" class="form-label" data-i18n="email">Email</label>
        <input type="email" id="email" class="form-control" required aria-describedby="email-error">
        <div class="error-message" id="email-error" data-i18n="email_error">Please enter a valid email</div>
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label" data-i18n="password">Password</label>
        <div class="password-container">
          <input type="password" id="password" class="form-control" required aria-describedby="password-error">
          <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
        </div>
        <div class="error-message" id="password-error" data-i18n="password_error">Incorrect password</div>
      </div>
      
      <div class="forgot-password">
        <a href="#" data-i18n="forgot_password">Forgot password?</a>
      </div>
      
      <button type="submit" class="btn btn-primary" id="login-button" data-i18n="login_button">
        <span class="btn-text">Log In</span>
        <div class="spinner" id="spinner"></div>
      </button>
      
      <div class="divider" data-i18n="or">or</div>
      
      <button type="button" class="btn btn-google" id="google-login">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span data-i18n="continue_with_google">Continue with Google</span>
      </button>
    </form>
    
    <div class="signup-link">
      <span data-i18n="no_account">Don't have an account?</span> <a href="signup.html" data-i18n="sign_up">Sign up</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAadEukg8HmIUwJ6BC2oYYwbz0qb19iR2I",
      authDomain: "msika-2.firebaseapp.com",
      projectId: "msika-2",
      storageBucket: "msika-2.firebasestorage.app",
      messagingSenderId: "826396419263",
      appId: "1:826396419263:web:1fb8752bafd530ba81520a",
      measurementId: "G-1N7LBBXWGF"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    
    // DOM Elements
    const loginForm = document.getElementById('login-form');
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    const languageSelector = document.getElementById('language-selector');
    const themeLabel = document.getElementById('theme-label');
    const togglePassword = document.querySelector('.toggle-password');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('login-button');
    const spinner = document.getElementById('spinner');
    const btnText = document.querySelector('.btn-text');
    
    // Translations
    const translations = {
      en: {
        app_name: "Marketplace",
        welcome_back: "Welcome Back",
        email: "Email",
        password: "Password",
        email_error: "Please enter a valid email",
        password_error: "Incorrect password",
        forgot_password: "Forgot password?",
        login_button: "Log In",
        no_account: "Don't have an account?",
        sign_up: "Sign up",
        dark_mode: "Dark Mode",
        or: "or",
        continue_with_google: "Continue with Google"
      },
      es: {
        app_name: "Tienda",
        welcome_back: "Bienvenido de nuevo",
        email: "Correo electrónico",
        password: "Contraseña",
        email_error: "Por favor ingrese un correo válido",
        password_error: "Contraseña incorrecta",
        forgot_password: "¿Olvidaste tu contraseña?",
        login_button: "Iniciar sesión",
        no_account: "¿No tienes una cuenta?",
        sign_up: "Regístrate",
        dark_mode: "Modo Oscuro",
        or: "o",
        continue_with_google: "Continuar con Google"
      },
      ny: {
        app_name: "Msika",
        welcome_back: "Takulandirani",
        email: "Imelo",
        password: "Mawu achinsinsi",
        email_error: "Chonde lowetsani imelo yovomerezeka",
        password_error: "Mawu achinsinsi olakwika",
        forgot_password: "Mwaiwala mawu anu achinsinsi?",
        login_button: "Lowani muakaunti",
        no_account: "Mulibe akaunti?",
        sign_up: "Lembetsani",
        dark_mode: "Njira Yakuda",
        or: "kapena",
        continue_with_google: "Pitilizani ndi Google"
      }
    };
    
    function initTheme() {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
      darkModeToggle.checked = savedTheme === 'dark';
      updateThemeLabel();
    }
    
    function updateThemeLabel() {
      const currentLang = localStorage.getItem('language') || 'en';
      themeLabel.textContent = translations[currentLang].dark_mode;
    }
    
    function initLanguage() {
      const savedLang = localStorage.getItem('language') || 'en';
      languageSelector.value = savedLang;
      updatePageLanguage(savedLang);
    }
    
    function updatePageLanguage(lang) {
      document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (translations[lang][key]) {
          element.textContent = translations[lang][key];
        }
      });
      updateThemeLabel();
    }
    
    if (togglePassword) {
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
      });
    }
    
    if (darkModeToggle) {
      darkModeToggle.addEventListener('change', function() {
        if (this.checked) {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
        }
      });
    }
    
    if (languageSelector) {
      languageSelector.addEventListener('change', function() {
        const lang = this.value;
        localStorage.setItem('language', lang);
        updatePageLanguage(lang);
      });
    }
    
    // Check if user is already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const userData = userDoc.data();
          localStorage.setItem('isSeller', userData.isSeller || false);
          if (userData.isSeller) {
            window.location.href = 'seller.html';
          } else {
            window.location.href = 'buyer.html';
          }
        }
      }
    });
    
    // Form submission
    if (loginForm) {
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        document.querySelectorAll('.error-message').forEach(el => {
          el.style.display = 'none';
        });
        
        loginButton.disabled = true;
        btnText.style.display = 'none';
        spinner.style.display = 'block';
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        if (!validateEmail(email)) {
          document.getElementById('email-error').style.display = 'block';
          loginButton.disabled = false;
          btnText.style.display = 'inline';
          spinner.style.display = 'none';
          return;
        }
        
        try {
          const userCredential = await signInWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;
          
          const userDoc = await getDoc(doc(db, "users", user.uid));
          const userData = userDoc.data();
          
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('isSeller', userData?.isSeller || false);
          localStorage.setItem('userName', userData?.fullName || user.displayName);
          localStorage.setItem('userEmail', user.email);
          localStorage.setItem('userId', user.uid);
          
          if (userData?.isSeller) {
            window.location.href = 'seller.html';
          } else {
            window.location.href = 'buyer.html';
          }
          
        } catch (error) {
          document.getElementById('password-error').style.display = 'block';
          loginButton.disabled = false;
          btnText.style.display = 'inline';
          spinner.style.display = 'none';
        }
      });
    }
    
    // Google login
    const googleLoginBtn = document.getElementById('google-login');
    if (googleLoginBtn) {
      googleLoginBtn.addEventListener('click', async function() {
        googleLoginBtn.disabled = true;
        googleLoginBtn.innerHTML = '<div class="spinner" style="display: block;"></div>';
        
        try {
          const result = await signInWithPopup(auth, googleProvider);
          const user = result.user;
          
          const userDoc = await getDoc(doc(db, "users", user.uid));
          const userData = userDoc.data();
          
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('isSeller', userData?.isSeller || false);
          localStorage.setItem('userName', userData?.fullName || user.displayName);
          localStorage.setItem('userEmail', user.email);
          localStorage.setItem('userId', user.uid);
          
          if (userData?.isSeller) {
            window.location.href = 'seller.html';
          } else {
            window.location.href = 'buyer.html';
          }
          
        } catch (error) {
          alert('Google login failed: ' + error.message);
          googleLoginBtn.disabled = false;
          googleLoginBtn.innerHTML = 'Continue with Google';
        }
      });
    }
    
    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }
    
    initTheme();
    initLanguage();
  </script>
</body>
</html>
