<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Msika</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 24px;
    }
    
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      border-color: #4361ee;
    }
    
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: #4361ee;
      color: white;
    }
    
    .btn-google {
      background: white;
      color: #4285F4;
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #e0e0e0;
    }
    
    .divider::before {
      left: 0;
    }
    
    .divider::after {
      right: 0;
    }
    
    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    
    .signup-link a {
      color: #4361ee;
      text-decoration: none;
    }
    
    .error-message {
      color: #dc2626;
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }
    
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🛒</div>
    <h1>Welcome Back</h1>
    
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required>
      <div class="error-message" id="email-error">Please enter a valid email</div>
      
      <input type="password" id="password" placeholder="Password" required>
      <div class="error-message" id="password-error">Invalid email or password</div>
      
      <button type="submit" class="btn-primary" id="login-btn">
        <span id="btn-text">Sign In</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
    
    <div class="divider">or</div>
    
    <button class="btn-google" id="google-login">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Create Account</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAadEukg8HmIUwJ6BC2oYYwbz0qb19iR2I",
      authDomain: "msika-2.firebaseapp.com",
      projectId: "msika-2",
      storageBucket: "msika-2.firebasestorage.app",
      messagingSenderId: "826396419263",
      appId: "1:826396419263:web:1fb8752bafd530ba81520a"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');
    const googleBtn = document.getElementById('google-login');
    
    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
    
    function showError(elementId) {
      document.getElementById(elementId).style.display = 'block';
    }
    
    function hideErrors() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
      });
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideErrors();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      if (!validateEmail(email)) {
        showError('email-error');
        return;
      }
      
      loginBtn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        showError('password-error');
        loginBtn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    });
    
    googleBtn.addEventListener('click', async () => {
      googleBtn.disabled = true;
      googleBtn.innerHTML = '<div class="spinner" style="display: block;"></div>';
      
      try {
        await signInWithPopup(auth, googleProvider);
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert('Google login failed');
        googleBtn.disabled = false;
        googleBtn.innerHTML = 'Continue with Google';
      }
    });
  </script>
</body>
</html>
