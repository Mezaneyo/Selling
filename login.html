<!DOCTYPE html>
<html lang="en">
<head>
    
  <!-- Add these lines -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4361ee">
  
  <!-- For iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    :root {
      --primary: #4361ee;
      --secondary: #3f37c9;
      --error: #f72585;
      --light: #f8f9fa;
      --dark: #212529;
      --bg-color: #f5f7fa;
      --text-color: #212529;
      --card-bg: white;
      --border-color: #e2e8f0;
    }
    
    [data-theme="dark"] {
      --primary: #5a72f5;
      --secondary: #4a5ae9;
      --error: #ff4d8f;
      --light: #2d3748;
      --dark: #f8f9fa;
      --bg-color: #1a202c;
      --text-color: #f8f9fa;
      --card-bg: #2d3748;
      --border-color: #4a5568;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: grid;
      place-items: center;
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }
    
    .login-container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 2.5rem;
      margin: 1rem;
      transition: background-color 0.3s;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 1rem;
      transition: all 0.3s;
      background-color: var(--card-bg);
      color: var(--text-color);
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
    }
    
    .error-message {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 0.25rem;
      display: none;
    }
    
    .btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    
    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background-color: var(--secondary);
    }
    
    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-color);
      opacity: 0.8;
    }
    
    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    
    .forgot-password {
      text-align: right;
      margin-top: -1rem;
      margin-bottom: 1.5rem;
    }
    
    .forgot-password a {
      color: var(--text-color);
      opacity: 0.7;
      font-size: 0.85rem;
      text-decoration: none;
    }
    
    .settings-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: var(--primary);
    }
    
    input:checked + .slider:before {
      transform: translateX(30px);
    }
    
    .language-selector {
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      color: var(--text-color);
    }
    
    .theme-label {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    
    @media (max-width: 600px) {
      .login-container {
        padding: 1.5rem;
      }
      
      .settings-bar {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="settings-bar">
      <select class="language-selector" id="language-selector">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="ny">Chichewa</option>
      </select>
      
      <div class="toggle-container">
        <span class="theme-label" id="theme-label">Dark Mode</span>
        <label class="toggle-switch">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    
    <div class="logo" data-i18n="app_name">Marketplace</div>
    <h1 style="text-align: center; margin-bottom: 1.5rem;" data-i18n="welcome_back">Welcome Back</h1>
    
    <form id="login-form">
      <div class="form-group">
        <label for="email" class="form-label" data-i18n="email">Email</label>
        <input type="email" id="email" class="form-control" required>
        <div class="error-message" id="email-error" data-i18n="email_error">Please enter a valid email</div>
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label" data-i18n="password">Password</label>
        <input type="password" id="password" class="form-control" required>
        <div class="error-message" id="password-error" data-i18n="password_error">Incorrect password</div>
      </div>
      
      <div class="forgot-password">
        <a href="#" data-i18n="forgot_password">Forgot password?</a>
      </div>
      
      <button type="submit" class="btn btn-primary" data-i18n="login_button">Log In</button>
    </form>
    
    <div class="signup-link">
      <span data-i18n="no_account">Don't have an account?</span> <a href="signup.html" data-i18n="sign_up">Sign up</a>
    </div>
  </div>

  <script>
    // DOM Elements
    const loginForm = document.getElementById('login-form');
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    const languageSelector = document.getElementById('language-selector');
    const themeLabel = document.getElementById('theme-label');
    
    // Translation dictionary
    const translations = {
      en: {
        app_name: "Marketplace",
        welcome_back: "Welcome Back",
        email: "Email",
        password: "Password",
        email_error: "Please enter a valid email",
        password_error: "Incorrect password",
        forgot_password: "Forgot password?",
        login_button: "Log In",
        no_account: "Don't have an account?",
        sign_up: "Sign up",
        dark_mode: "Dark Mode"
      },
      es: {
        app_name: "Tienda",
        welcome_back: "Bienvenido de nuevo",
        email: "Correo electrónico",
        password: "Contraseña",
        email_error: "Por favor ingrese un correo válido",
        password_error: "Contraseña incorrecta",
        forgot_password: "¿Olvidaste tu contraseña?",
        login_button: "Iniciar sesión",
        no_account: "¿No tienes una cuenta?",
        sign_up: "Regístrate",
        dark_mode: "Modo Oscuro"
      },
      ny: {
        app_name: "Msika",
        welcome_back: "Takulandirani",
        email: "Imelo",
        password: "Mawu achinsinsi",
        email_error: "Chonde lowetsani imelo yovomerezeka",
        password_error: "Mawu achinsinsi olakwika",
        forgot_password: "Mwaiwala mawu anu achinsinsi?",
        login_button: "Lowani muakaunti",
        no_account: "Mulibe akaunti?",
        sign_up: "Lembetsani",
        dark_mode: "Njira Yakuda"
      }
    };
    
    // Mock user data
    const mockUsers = [
      {
        email: "buyer@example.com",
        password: "password123",
        isSeller: false
      },
      {
        email: "seller@example.com",
        password: "password123",
        isSeller: true
      }
    ];

    // Initialize theme
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      darkModeToggle.checked = savedTheme === 'dark';
      updateThemeLabel();
    }
    
    // Update theme label text
    function updateThemeLabel() {
      const currentLang = localStorage.getItem('language') || 'en';
      themeLabel.textContent = translations[currentLang].dark_mode;
    }
    
    // Initialize language
    function initLanguage() {
      const savedLang = localStorage.getItem('language') || 'en';
      languageSelector.value = savedLang;
      updatePageLanguage(savedLang);
    }
    
    // Update page language
    function updatePageLanguage(lang) {
      document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (translations[lang][key]) {
          element.textContent = translations[lang][key];
        }
      });
      updateThemeLabel();
    }
    
    // Toggle dark mode
    darkModeToggle.addEventListener('change', function() {
      if (this.checked) {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
      }
    });
    
    // Change language
    languageSelector.addEventListener('change', function() {
      const lang = this.value;
      localStorage.setItem('language', lang);
      updatePageLanguage(lang);
    });
    
    // Form submission
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Reset errors
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
      });
      
      // Get inputs
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Validate
      let isValid = true;
      
      if (!email.includes('@') || !email.includes('.')) {
        document.getElementById('email-error').style.display = 'block';
        isValid = false;
      }
      
      // Check credentials
      const user = mockUsers.find(u => u.email === email && u.password === password);
      
      if (!user) {
        document.getElementById('password-error').style.display = 'block';
        isValid = false;
      }
      
      if (isValid && user) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('isSeller', user.isSeller ? 'true' : 'false');
        
        if (user.isSeller) {
          window.location.href = 'seller.html';
        } else {
          window.location.href = 'buyer.html';
        }
      }
    });
    
    // Initialize page
    initTheme();
    initLanguage();
  </script>
</body>
</html>
