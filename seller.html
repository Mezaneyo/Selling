<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard - Msika Marketplace</title>
  <style>
    :root {
      --primary: #4361ee;
      --primary-hover: #3a56d4;
      --danger: #ef233c;
      --success: #10b981;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --bg-color: #f5f7fa;
      --text-color: #212529;
      --card-bg: white;
      --border-color: #e2e8f0;
      --shadow: 0 4px 6px rgba(0,0,0,0.05);
      --transition: all 0.3s ease;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
    }
    
    header {
      background-color: var(--card-bg);
      box-shadow: var(--shadow);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .nav-brand {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .nav-brand span {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    
    .nav-link {
      color: var(--text-color);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    
    .nav-link:hover {
      color: var(--primary);
    }
    
    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
    
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--text-color);
    }
    
    .stats-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .card {
      background-color: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 2rem;
      transition: var(--transition);
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-color);
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 1rem;
      transition: var(--transition);
      background-color: var(--card-bg);
      color: var(--text-color);
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }
    
    textarea.form-control {
      min-height: 120px;
      resize: vertical;
    }
    
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    }
    
    .btn-danger {
      background-color: var(--danger);
      color: white;
    }
    
    .btn-danger:hover {
      background-color: #d90429;
    }
    
    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
    }
    
    #product-image-preview {
      max-width: 150px;
      max-height: 150px;
      border-radius: 10px;
      margin-top: 1rem;
      display: none;
      object-fit: cover;
      border: 2px solid var(--border-color);
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    
    .product-card {
      background-color: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    .product-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    
    .product-body {
      padding: 1rem;
    }
    
    .product-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text-color);
    }
    
    .product-description {
      color: var(--gray);
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .product-category {
      display: inline-block;
      background-color: var(--border-color);
      color: var(--text-color);
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
    }
    
    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }
    
    .product-price {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.1rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--gray);
      grid-column: 1 / -1;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: var(--primary);
      color: white;
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      font-size: 14px;
    }
    
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .upload-progress {
      margin-top: 10px;
      font-size: 12px;
      color: var(--gray);
      display: none;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 0 1rem;
      }
      
      header {
        padding: 0.8rem 1rem;
      }
      
      .nav-brand {
        font-size: 1.1rem;
      }
      
      .nav-links {
        gap: 1rem;
      }
      
      .products-grid {
        grid-template-columns: 1fr;
      }
      
      .card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-brand">
      🛒 <span>Msika Marketplace</span>
    </div>
    <div class="nav-links">
      <a href="buyer.html" class="nav-link">🛍️ Shop</a>
      <a href="#" class="nav-link" onclick="logout()">🚪 Logout</a>
    </div>
  </header>

  <div class="container">
    <div class="dashboard-header">
      <h1 class="section-title">📦 Seller Dashboard</h1>
      <div class="stats-card">
        📊 Products: <span id="product-count">0</span>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">➕ Add New Product</h2>
      <form id="product-form">
        <div class="form-group">
          <label class="form-label">Product Name *</label>
          <input type="text" id="product-name" class="form-control" placeholder="e.g., Wireless Headphones" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Price ($) *</label>
          <input type="number" id="product-price" class="form-control" step="0.01" min="0" placeholder="0.00" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select id="product-category" class="form-control" required>
            <option value="">Select Category</option>
            <option value="Electronics">📱 Electronics</option>
            <option value="Fashion">👕 Fashion</option>
            <option value="Home">🏠 Home & Garden</option>
            <option value="Sports">⚽ Sports</option>
            <option value="Books">📚 Books</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="product-description" class="form-control" rows="3" placeholder="Describe your product..."></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label">Product Image *</label>
          <input type="file" id="product-image" class="form-control" accept="image/*" required>
          <img id="product-image-preview" alt="Product Preview">
          <div class="upload-progress" id="upload-progress">⏳ Uploading image...</div>
        </div>
        
        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span class="btn-text">➕ Add Product</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>
    </div>

    <h2 class="section-title">📋 Your Products</h2>
    <div class="products-grid" id="products-container">
      <div class="empty-state">🔄 Loading your products...</div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toast-message"></span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAadEukg8HmIUwJ6BC2oYYwbz0qb19iR2I",
      authDomain: "msika-2.firebaseapp.com",
      projectId: "msika-2",
      storageBucket: "msika-2.firebasestorage.app",
      messagingSenderId: "826396419263",
      appId: "1:826396419263:web:1fb8752bafd530ba81520a"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // ========== YOUR IMGBB API KEY ==========
    const IMGBB_API_KEY = "896e4e925b76df72f34389ab1d0832d8";
    // ========================================
    
    let currentUser = null;
    
    async function uploadImageToImgBB(file) {
      const formData = new FormData();
      formData.append('image', file);
      
      const progressDiv = document.getElementById('upload-progress');
      progressDiv.style.display = 'block';
      
      try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        progressDiv.style.display = 'none';
        
        if (data.success) {
          return data.data.url;
        } else {
          throw new Error(data.error?.message || 'Upload failed');
        }
      } catch (error) {
        progressDiv.style.display = 'none';
        console.error("ImgBB upload error:", error);
        throw error;
      }
    }
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      toastMessage.textContent = message;
      toast.style.backgroundColor = isError ? '#dc2626' : '#4361ee';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    async function loadProducts() {
      if (!currentUser) return;
      
      try {
        const productsRef = collection(db, "products");
        const q = query(productsRef, where("sellerId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        document.getElementById('product-count').textContent = products.length;
        const container = document.getElementById('products-container');
        
        if (products.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              📦 No products yet<br>
              <small>Add your first product using the form above</small>
            </div>
          `;
          return;
        }
        
        container.innerHTML = products.map(product => `
          <div class="product-card">
            <img src="${product.imageUrl}" class="product-image" alt="${product.name}" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
            <div class="product-body">
              <span class="product-category">${product.category}</span>
              <h3 class="product-title">${escapeHtml(product.name)}</h3>
              <p class="product-description">${escapeHtml(product.description || 'No description')}</p>
              <div class="product-footer">
                <div class="product-price">$${product.price.toFixed(2)}</div>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct('${product.id}')">🗑️ Delete</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error("Error loading products:", error);
        showToast('Error loading products', true);
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    window.deleteProduct = async (productId) => {
      if (confirm('Are you sure you want to delete this product?')) {
        try {
          await deleteDoc(doc(db, "products", productId));
          showToast('✅ Product deleted successfully!');
          await loadProducts();
        } catch (error) {
          console.error("Delete error:", error);
          showToast('Failed to delete product', true);
        }
      }
    };
    
    // Image preview
    const imageInput = document.getElementById('product-image');
    const imagePreview = document.getElementById('product-image-preview');
    
    imageInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          imagePreview.src = event.target.result;
          imagePreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        imagePreview.style.display = 'none';
      }
    });
    
    // Form submission
    const productForm = document.getElementById('product-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.querySelector('.btn-text');
    const spinner = document.getElementById('spinner');
    
    productForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const name = document.getElementById('product-name').value.trim();
      const price = parseFloat(document.getElementById('product-price').value);
      const category = document.getElementById('product-category').value;
      const description = document.getElementById('product-description').value.trim();
      const imageFile = imageInput.files[0];
      
      if (!name || isNaN(price) || !category) {
        showToast('Please fill all required fields', true);
        return;
      }
      
      if (!imageFile) {
        showToast('Please select a product image', true);
        return;
      }
      
      submitBtn.disabled = true;
      btnText.textContent = 'Uploading...';
      spinner.style.display = 'block';
      
      try {
        // Upload image to ImgBB (FREE)
        let imageUrl = await uploadImageToImgBB(imageFile);
        
        // Save product to Firestore (FREE)
        await addDoc(collection(db, "products"), {
          name,
          price,
          category,
          description: description || '',
          imageUrl,
          sellerId: currentUser.uid,
          sellerName: currentUser.displayName || 'Seller',
          createdAt: new Date()
        });
        
        // Reset form
        productForm.reset();
        imagePreview.style.display = 'none';
        imagePreview.src = '';
        
        showToast('✅ Product added successfully!');
        await loadProducts();
        
      } catch (error) {
        console.error("Error:", error);
        showToast('❌ Failed to add product: ' + error.message, true);
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = '➕ Add Product';
        spinner.style.display = 'none';
      }
    });
    
    window.logout = async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    };
    
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (!userDoc.exists() || !userDoc.data().isSeller) {
          alert('⚠️ You are not registered as a seller.\nPlease sign up as a seller to access this page.');
          window.location.href = 'buyer.html';
          return;
        }
      } catch(e) {
        console.warn("Could not verify seller status");
      }
      
      await loadProducts();
    });
  </script>
</body>
</html>
