<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Msika</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 24px;
    }
    
    .account-type {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .account-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-weight: 500;
      background: white;
    }
    
    .account-btn.active {
      border-color: #4361ee;
      background: rgba(67, 97, 238, 0.1);
      color: #4361ee;
    }
    
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      border-color: #4361ee;
    }
    
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn-primary {
      background: #4361ee;
      color: white;
    }
    
    .btn-google {
      background: white;
      color: #4285F4;
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
    }
    
    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    
    .login-link a {
      color: #4361ee;
      text-decoration: none;
    }
    
    .error-message {
      color: #dc2626;
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }
    
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🛒</div>
    <h1>Create Account</h1>
    
    <div class="account-type">
      <div class="account-btn active" id="buyer-btn">I'm a Buyer</div>
      <div class="account-btn" id="seller-btn">I'm a Seller</div>
    </div>
    
    <form id="signup-form">
      <input type="text" id="full-name" placeholder="Full Name" required>
      <div class="error-message" id="name-error">Please enter your name</div>
      
      <input type="email" id="email" placeholder="Email" required>
      <div class="error-message" id="email-error">Please enter a valid email</div>
      
      <input type="password" id="password" placeholder="Password (min 6 characters)" minlength="6" required>
      <div class="error-message" id="password-error">Password must be at least 6 characters</div>
      
      <button type="submit" class="btn-primary" id="submit-btn">
        <span id="btn-text">Create Account</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
    
    <div class="divider">or</div>
    
    <button class="btn-google" id="google-signup">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    
    <div class="login-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAadEukg8HmIUwJ6BC2oYYwbz0qb19iR2I",
      authDomain: "msika-2.firebaseapp.com",
      projectId: "msika-2",
      storageBucket: "msika-2.firebasestorage.app",
      messagingSenderId: "826396419263",
      appId: "1:826396419263:web:1fb8752bafd530ba81520a"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    
    let accountType = 'buyer';
    
    document.getElementById('buyer-btn').onclick = () => {
      document.getElementById('buyer-btn').classList.add('active');
      document.getElementById('seller-btn').classList.remove('active');
      accountType = 'buyer';
    };
    
    document.getElementById('seller-btn').onclick = () => {
      document.getElementById('seller-btn').classList.add('active');
      document.getElementById('buyer-btn').classList.remove('active');
      accountType = 'seller';
    };
    
    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
    
    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }
    
    function hideErrors() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
      });
    }
    
    document.getElementById('signup-form').onsubmit = async (e) => {
      e.preventDefault();
      hideErrors();
      
      const fullName = document.getElementById('full-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      let isValid = true;
      
      if (!fullName) {
        showError('name-error', 'Please enter your name');
        isValid = false;
      }
      
      if (!validateEmail(email)) {
        showError('email-error', 'Please enter a valid email');
        isValid = false;
      }
      
      if (password.length < 6) {
        showError('password-error', 'Password must be at least 6 characters');
        isValid = false;
      }
      
      if (!isValid) return;
      
      const submitBtn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCredential.user, { displayName: fullName });
        await setDoc(doc(db, "users", userCredential.user.uid), {
          fullName: fullName,
          email: email,
          isSeller: accountType === 'seller',
          createdAt: serverTimestamp()
        });
        
        window.location.href = 'dashboard.html';
      } catch (error) {
        let errorMessage = 'Signup failed. Please try again.';
        if (error.code === 'auth/email-already-in-use') {
          errorMessage = 'Email already registered. Please login.';
        }
        showError('email-error', errorMessage);
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    };
    
    document.getElementById('google-signup').onclick = async () => {
      const googleBtn = document.getElementById('google-signup');
      googleBtn.disabled = true;
      googleBtn.innerHTML = '<div class="spinner" style="display: block;"></div>';
      
      try {
        const result = await signInWithPopup(auth, googleProvider);
        await setDoc(doc(db, "users", result.user.uid), {
          fullName: result.user.displayName,
          email: result.user.email,
          isSeller: accountType === 'seller',
          createdAt: serverTimestamp()
        }, { merge: true });
        
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert('Google signup failed');
        googleBtn.disabled = false;
        googleBtn.innerHTML = 'Continue with Google';
      }
    };
  </script>
</body>
</html>
