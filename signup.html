<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4361ee">
  <title>Create Account - Msika Marketplace</title>
  <style>
    :root {
      --primary: #4361ee;
      --primary-hover: #3a56d4;
      --secondary: #3f37c9;
      --error: #f72585;
      --success: #4bb543;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --bg-color: #f5f7fa;
      --text-color: #212529;
      --card-bg: white;
      --border-color: #e2e8f0;
      --shadow: 0 4px 20px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }
    
    .signup-container {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 2rem;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .logo {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }
    
    .account-type {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .account-btn {
      flex: 1;
      padding: 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background-color: var(--card-bg);
      color: var(--text-color);
    }
    
    .account-btn.active {
      border-color: var(--primary);
      background-color: rgba(67, 97, 238, 0.1);
      color: var(--primary);
    }
    
    .form-group {
      margin-bottom: 1.2rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      background-color: var(--card-bg);
      color: var(--text-color);
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }
    
    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background-color: var(--primary-hover);
    }
    
    .btn-google {
      background-color: white;
      color: #4285F4;
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .divider {
      text-align: center;
      margin: 1.2rem 0;
      color: var(--gray);
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: var(--border-color);
    }
    
    .divider::before {
      left: 0;
    }
    
    .divider::after {
      right: 0;
    }
    
    .login-link {
      text-align: center;
      margin-top: 1.2rem;
    }
    
    .login-link a {
      color: var(--primary);
      text-decoration: none;
    }
    
    .error-message {
      color: var(--error);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      display: none;
    }
    
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .settings-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      align-items: center;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border-color);
      transition: .4s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: var(--primary);
    }
    
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    
    .language-selector {
      padding: 0.3rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      color: var(--text-color);
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    .theme-label {
      font-size: 0.75rem;
    }
    
    @media (max-width: 600px) {
      .signup-container {
        padding: 1.2rem;
      }
      .account-type {
        flex-direction: column;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="settings-bar">
      <select class="language-selector" id="language-selector">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="ny">Chichewa</option>
      </select>
      <div class="toggle-container">
        <span class="theme-label">Dark Mode</span>
        <label class="toggle-switch">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    
    <div class="logo">🛒 Msika</div>
    <h1>Create Account</h1>
    
    <div class="account-type">
      <div class="account-btn active" id="buyer-btn">I'm a Buyer</div>
      <div class="account-btn" id="seller-btn">I'm a Seller</div>
    </div>
    
    <form id="signup-form">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="full-name" class="form-control" required>
        <div class="error-message" id="name-error">Please enter your name</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
        <div class="error-message" id="email-error">Please enter a valid email</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" minlength="6" required>
        <div class="error-message" id="password-error">Password must be at least 6 characters</div>
      </div>
      
      <button type="submit" class="btn btn-primary" id="submit-btn">
        <span id="btn-text">Create Account</span>
        <div class="spinner" id="spinner"></div>
      </button>
      
      <div class="divider">or</div>
      
      <button type="button" class="btn btn-google" id="google-signup">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>
    
    <div class="login-link">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAadEukg8HmIUwJ6BC2oYYwbz0qb19iR2I",
      authDomain: "msika-2.firebaseapp.com",
      projectId: "msika-2",
      storageBucket: "msika-2.firebasestorage.app",
      messagingSenderId: "826396419263",
      appId: "1:826396419263:web:1fb8752bafd530ba81520a"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    
    let accountType = 'buyer';
    
    // Account type selection
    document.getElementById('buyer-btn').addEventListener('click', () => {
      document.getElementById('buyer-btn').classList.add('active');
      document.getElementById('seller-btn').classList.remove('active');
      accountType = 'buyer';
    });
    
    document.getElementById('seller-btn').addEventListener('click', () => {
      document.getElementById('seller-btn').classList.add('active');
      document.getElementById('buyer-btn').classList.remove('active');
      accountType = 'seller';
    });
    
    // Dark mode
    const darkToggle = document.getElementById('dark-mode-toggle');
    if (darkToggle) {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      darkToggle.checked = savedTheme === 'dark';
      darkToggle.addEventListener('change', () => {
        const theme = darkToggle.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      });
    }
    
    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.display = 'block';
    }
    
    function hideErrors() {
      document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
    }
    
    // EMAIL SIGNUP
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideErrors();
      
      const fullName = document.getElementById('full-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!fullName) {
        showError('name-error', 'Please enter your name');
        return;
      }
      if (!email.includes('@')) {
        showError('email-error', 'Enter a valid email');
        return;
      }
      if (password.length < 6) {
        showError('password-error', 'Password must be at least 6 characters');
        return;
      }
      
      const submitBtn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCredential.user, { displayName: fullName });
        
        await setDoc(doc(db, "users", userCredential.user.uid), {
          fullName: fullName,
          email: email,
          isSeller: accountType === 'seller',
          createdAt: serverTimestamp(),
          uid: userCredential.user.uid
        });
        
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('isSeller', accountType === 'seller');
        localStorage.setItem('userName', fullName);
        localStorage.setItem('userId', userCredential.user.uid);
        
        window.location.href = accountType === 'seller' ? 'seller.html' : 'buyer.html';
      } catch (error) {
        console.error(error);
        let msg = error.message;
        if (error.code === 'auth/email-already-in-use') msg = 'Email already registered. Please login.';
        showError('email-error', msg);
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    });
    
    // GOOGLE SIGNUP - FIXED
    document.getElementById('google-signup').addEventListener('click', async () => {
      const googleBtn = document.getElementById('google-signup');
      googleBtn.disabled = true;
      googleBtn.innerHTML = '<div class="spinner" style="display: block;"></div>';
      
      try {
        console.log("Starting Google sign-in...");
        const result = await signInWithPopup(auth, googleProvider);
        console.log("Google sign-in successful:", result.user.email);
        
        const user = result.user;
        
        // Save user to Firestore
        try {
          await setDoc(doc(db, "users", user.uid), {
            fullName: user.displayName,
            email: user.email,
            isSeller: accountType === 'seller',
            createdAt: serverTimestamp(),
            uid: user.uid
          }, { merge: true });
          console.log("User saved to Firestore");
        } catch (firestoreError) {
          console.warn("Firestore error:", firestoreError);
          // Continue anyway - user is authenticated
        }
        
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('isSeller', accountType === 'seller');
        localStorage.setItem('userName', user.displayName);
        localStorage.setItem('userEmail', user.email);
        localStorage.setItem('userId', user.uid);
        
        console.log("Redirecting to dashboard...");
        window.location.href = accountType === 'seller' ? 'seller.html' : 'buyer.html';
        
      } catch (error) {
        console.error("Google sign-in error:", error);
        let errorMessage = error.message;
        if (error.code === 'auth/unauthorized-domain') {
          errorMessage = 'This domain is not authorized. Please add "selling-two.vercel.app" to Firebase Authorized Domains.';
        } else if (error.code === 'auth/popup-blocked') {
          errorMessage = 'Pop-up was blocked. Please allow pop-ups for this site.';
        } else if (error.code === 'auth/network-request-failed') {
          errorMessage = 'Network error. Please check your internet connection.';
        }
        alert('Google signup failed: ' + errorMessage);
        googleBtn.disabled = false;
        googleBtn.innerHTML = 'Continue with Google';
      }
    });
  </script>
</body>
</html>
